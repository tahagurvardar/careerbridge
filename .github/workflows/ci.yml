name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.23.1

jobs:
  quality:
    name: Static, unit, and build gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_BASE_URL: https://ci.example.test
      BETTER_AUTH_URL: https://ci.example.test
      BETTER_AUTH_SECRET: ci-only-secret-that-is-never-used-000000000000
      DIRECT_URL: postgresql://ci:ci@localhost:5432/careerbridge_ci?sslmode=disable
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run unit tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Build production application
        run: npm run build

  integration:
    name: Isolated PostgreSQL integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # All branches and PRs share one isolated Neon test database. Serialize
    # integration jobs so concurrent `prisma migrate deploy` runs cannot
    # collide on the database advisory lock (P1002). Never cancel a running
    # migration; queued runs wait instead.
    concurrency:
      group: careerbridge-isolated-test-database
      cancel-in-progress: false
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      # Synthetic CI-only Auth values (never production credentials). The
      # integration suites require these to construct the Better Auth server.
      APP_BASE_URL: https://ci.example.test
      BETTER_AUTH_URL: https://ci.example.test
      BETTER_AUTH_SECRET: ci-only-secret-that-is-never-used-000000000000
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Require the isolated test database secret
        shell: bash
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "::error::TEST_DATABASE_URL is not configured. Integration tests did not run."
            exit 1
          fi

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema against the test connection
        env:
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx prisma validate

      - name: Apply migrations to the isolated test database
        env:
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Run isolated integration tests
        env:
          RUN_DATABASE_INTEGRATION_TESTS: "true"
        run: npm run test:integration
